name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          #refer https://github.com/actions/runner-images/blob/main/images/macos/macos-26-arm64-Readme.md
          - runner: macos-26
          #refer https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
          - runner: macos-26-intel

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies 
        run: npm install

      - name: Get latest tag
        id: get_tag
        run: node scripts/get-latest-tag.mjs

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.get_tag.outputs.tag }}
          releaseName: 'Quick Authenticator ${{ steps.get_tag.outputs.tag }}'
          releaseBody: 'See the assets below to download for your platform.'
          releaseDraft: true
          prerelease: false
