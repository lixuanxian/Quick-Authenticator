name: Build Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    #ubuntu-24.04-arm refer https://github.com/actions/partner-runner-images/blob/main/images/arm-ubuntu-24-image.md#omitted-software
    #ubuntu-24.04-arm android sdk not supported yet, so we need to use macos runner for now
    #refer https://github.com/actions/runner-images/blob/main/images/macos/macos-26-arm64-Readme.md
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies 
        run: npm install

      - name: Init Android project
        run: npx tauri android init

      - name: Generate app icons
        run: node scripts/generate-icons.mjs

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: node scripts/setup-android-signing.mjs

      - name: Get latest tag
        id: get_tag
        run: node scripts/get-latest-tag.mjs

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.3.13750724
        run: npx tauri android build --apk --target aarch64

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: 'Quick Authenticator ${{ steps.get_tag.outputs.tag }}'
          body: 'See the assets below to download for your platform.'
          draft: true
          prerelease: false
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
